backend:
  name: github
  repo: dorposner/BINA-PV
  branch: main

media_folder: "public/images"
public_folder: "/images"

i18n:
  structure: multiple_folders
  locales: [he, en]
  default_locale: he

collections:
  - name: "events"
    label: "אירועים (Events)"
    folder: "src/content/events"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "כותרת (Title)", name: "title", widget: "string", i18n: true}
      - {label: "Permalink (URL Path in English)", name: "permalink", widget: "string", hint: "הכנס מזהה באנגלית ללא רווחים, למשל: shabbat-dinner", i18n: duplicate}
      - {label: "תאריך (Date)", name: "date", widget: "datetime", i18n: duplicate}
      - {label: "שעה (Time)", name: "time", widget: "string", required: false, i18n: duplicate}
      - {label: "תיאור (Description)", name: "description", widget: "text", required: false, i18n: true}
      - {label: "תמונה (Image)", name: "image", widget: "image", required: false, i18n: duplicate}
      - {label: "קישור הרשמה (Registration Link)", name: "registrationLink", widget: "string", required: false, i18n: duplicate}

  - name: "recommendations"
    label: "המלצות תיירות (Recommendations)"
    folder: "src/content/recommendations"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "כותרת (Title)", name: "title", widget: "string", i18n: true}
      - {label: "Permalink (URL Path in English)", name: "permalink", widget: "string", hint: "הכנס מזהה באנגלית ללא רווחים, למשל: cahuita-national-park", i18n: duplicate}
      - {label: "תיאור (Description)", name: "description", widget: "string", required: false, i18n: true}
      - {label: "גלריית תמונות (Image Gallery)", name: "imageGallery", widget: "list", field: {label: "תמונה", name: "image", widget: "image"}, required: false, i18n: duplicate}
      - {label: "קוד הטמעה מפות גוגל (Google Maps Embed)", name: "googleMapsEmbed", widget: "text", required: false, i18n: duplicate}
      - {label: "קישור חיצוני (External Link)", name: "externalLink", widget: "string", required: false, i18n: duplicate}
      - {label: "טקסט ארוך (Long Text)", name: "body", widget: "markdown", required: false, i18n: true}

  - name: "blog"
    label: "בלוג (Blog)"
    folder: "src/content/blog"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "כותרת (Title)", name: "title", widget: "string", i18n: true}
      - {label: "Permalink", name: "permalink", widget: "string", i18n: duplicate}
      - {label: "תאריך (Date)", name: "date", widget: "datetime", i18n: duplicate}
      - {label: "תיאור קצר (Description)", name: "description", widget: "text", required: false, i18n: true}
      - {label: "תמונה ראשית (Main Image)", name: "image", widget: "image", required: false, i18n: duplicate}
      - {label: "מאת (Author)", name: "author", widget: "string", required: false, i18n: duplicate}
      - {label: "תוכן הפוסט (Body)", name: "body", widget: "markdown", i18n: true}
